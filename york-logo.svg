  <text x="160" y="40" text-anchor="middle" fill="url(#york-red)" font-family="Arial Black, Helvetica Neue, sans-serif" font-size="30" font-weight="900" letter-spacing="0.04em">YORK</text>
  <text x="160" y="58" text-anchor="middle" fill="#b8c5d0" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.38em">UNIVERSITY</text>
  <circle cx="28" cy="44" r="10" fill="none" stroke="#e31837" stroke-width="1.5" opacity="0.85"/>
