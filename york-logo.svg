<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 88" role="img" aria-label="York University">
  <defs>
    <linearGradient id="york-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5c6c"/>
      <stop offset="50%" stop-color="#e31837"/>
      <stop offset="100%" stop-color="#a81028"/>
    </linearGradient>
    <linearGradient id="york-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
